spring:
  application:
    name: recruit_platform
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/main_db
    username: admin
    password: secret
  jpa:
    hibernate:
      ddl-auto: update  # 개발 초기엔 create, 이후 update or validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
